services:
  db:
    image: pgvector/pgvector:pg16
    container_name: face_recognition_db
    environment:
      POSTGRES_USER: faceapp
      POSTGRES_PASSWORD: faceapp
      POSTGRES_DB: face_recognition
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faceapp -d face_recognition"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
